services:
  postgres:
    image: postgres:16-alpine
    container_name: cognitive_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cognitive_agent
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: cognitive_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cognitive_agent?schema=public
      JWT_SECRET: ${JWT_SECRET:-nora-cognitive-agent-jwt-secret-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-FALSE}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL}
      GEMINI_STORY_MODEL: ${GEMINI_STORY_MODEL:-gemini-3.1-flash-lite-preview}
      GEMINI_IMAGE_API_KEY: ${GEMINI_IMAGE_API_KEY}
      IMAGEN_MODEL: ${IMAGEN_MODEL:-imagen-4.0-fast-generate-001}
      LIVE_VOICE_NAME: ${LIVE_VOICE_NAME:-Puck}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: cognitive_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
